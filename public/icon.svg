<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <style>
      .glow { filter: drop-shadow(0 0 4px #FFE6D0); }
        </style>
    </defs>

    <!-- Background circle -->
    <circle cx="50" cy="50" r="45" fill="#000000" stroke="#FFE6D0" stroke-width="2" class="glow"/>

    <!-- Inner geometric design -->
    <g transform="translate(50,50)">
        <!-- Outer circle -->
        <circle r="20" fill="none" stroke="#FFE6D0" stroke-width="1.5" class="glow"/>

        <!-- Inner cross -->
        <line x1="-15" y1="0" x2="15" y2="0" stroke="#FFE6D0" stroke-width="1" class="glow"/>
        <line x1="0" y1="-15" x2="0" y2="15" stroke="#FFE6D0" stroke-width="1" class="glow"/>

        <!-- Corner accents -->
        <circle cx="-12" cy="-12" r="2" fill="#FFE6D0" class="glow"/>
        <circle cx="12" cy="-12" r="2" fill="#FFE6D0" class="glow"/>
        <circle cx="-12" cy="12" r="2" fill="#FFE6D0" class="glow"/>
        <circle cx="12" cy="12" r="2" fill="#FFE6D0" class="glow"/>
    </g>
</svg>